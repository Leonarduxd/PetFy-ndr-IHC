<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetFy(ndr) - Adotar</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="cabecalho">
        <div class="cabecalho-logo">
            <a href="index.html">
                <img src="assets/logo PetFy(ndr).png" alt="Logo PetFy(ndr)" class="logo-img">
            </a>
        </div>
        <nav class="cabecalho-navegacao">
            <ul class="menu">
                <li><a href="index.html" class="menu-item">Início</a></li>
                <li><a href="adotar.html" class="menu-item ativo">Adotar</a></li>
                <li><a href="doacao.html" class="menu-item">Doações</a></li>
                <li><a href="quem-somos.html" class="menu-item">Quem Somos</a></li>
            </ul>
        </nav>
        <div class="area-usuario">
            <img src="assets/foto perfil comum.png" alt="Perfil do Usuário" class="profile-pic">
            <div class="menu-container">
                <div class="menu-icon">
                    <img src="assets/simbolo menu hamburger.png" alt="Menu" style="width: 30px; cursor: pointer;">
                </div>
                <div class="dropdown-menu">
                    <div class="dropdown-content">
                        <!-- Preenchido dinamicamente por js/auth-navbar.js -->
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="conteudo-principal adotar-main">
        <!-- Seção de Filtros (O Hub) -->
        <section class="secao-filtros">
            <form class="filtros-form" id="form-filtros">
                <!-- Filtros Básicos -->
                <div class="filtros-basicos">
                    <div class="filtro-campo">
                        <label for="filtro-especie" class="filtro-label">Espécie</label>
                        <select id="filtro-especie" name="especie" class="filtro-select">
                            <option value="">Todas</option>
                            <option value="Cachorro">Cães</option>
                            <option value="Gato">Gatos</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <div class="filtro-campo">
                        <label for="filtro-genero" class="filtro-label">Gênero</label>
                        <select id="filtro-genero" name="genero" class="filtro-select">
                            <option value="">Todos</option>
                            <option value="Macho">Macho</option>
                            <option value="Fêmea">Fêmea</option>
                        </select>
                    </div>
                    <div class="filtro-campo">
                        <label for="filtro-vermifugado" class="filtro-label">Vermifugado</label>
                        <select id="filtro-vermifugado" name="vermifugado" class="filtro-select">
                            <option value="">Todos</option>
                            <option value="Sim">Sim</option>
                            <option value="Não">Não</option>
                        </select>
                    </div>
                    <button type="button" id="btn-filtros-avancados" class="filtro-btn-avancados">
                        + Filtros Avançados
                    </button>
                    <button type="submit" class="filtro-btn">Filtrar</button>
                </div>

                <!-- Gaveta de Filtros Avançados (oculta por padrão) -->
                <div class="filtros-avancados" id="filtros-avancados-drawer">
                    <div class="filtro-campo">
                        <label for="filtro-nome" class="filtro-label">Nome</label>
                        <input type="text" id="filtro-nome" name="nome" placeholder="Buscar por nome..." class="filtro-input">
                    </div>
                    <div class="filtro-campo">
                        <label for="filtro-raca" class="filtro-label">Raça</label>
                        <input type="text" id="filtro-raca" name="raca" placeholder="Ex: SRD, Labrador..." class="filtro-input">
                    </div>
                    <div class="filtro-campo">
                        <label for="filtro-cor" class="filtro-label">Cor</label>
                        <input type="text" id="filtro-cor" name="cor" placeholder="Ex: Preto, Branco..." class="filtro-input">
                    </div>
                    <div class="filtro-campo filtro-campo-idade">
                        <label class="filtro-label">Idade (anos)</label>
                        <div class="filtro-idade-range">
                            <input type="number" id="filtro-idade-min" name="idade_min" placeholder="De" min="0" class="filtro-input filtro-input-num">
                            <span class="filtro-ate">até</span>
                            <input type="number" id="filtro-idade-max" name="idade_max" placeholder="Até" min="0" class="filtro-input filtro-input-num">
                        </div>
                    </div>
                </div>
            </form>
        </section>

        <!-- Seção da Grade de Pets (O Catálogo) -->
        <section class="grade-pets" id="grade-pets-container">
            <p id="loading-msg" style="padding: 2rem; color: var(--cor-secundaria); font-weight: bold;">
                Carregando pets disponíveis...
            </p>
        </section>
    </main>

    <footer class="rodape">
        <div class="rodape-conteudo">
            <p class="rodape-texto">&copy; 2026 PetFy(ndr). Todos os direitos reservados. Desenvolvido para facilitar a
                adoção e o cuidado animal.</p>
        </div>
    </footer>

    <!-- Script compartilhado: Auth + Navbar dinâmica -->
    <script src="js/auth-navbar.js"></script>

    <!-- Módulo 2: Catálogo dinâmico com filtro por status 'Disponível' -->
    <script>
        let todosOsPets = [];

        async function carregarPets() {
            const container = document.getElementById('grade-pets-container');
            const loadingMsg = document.getElementById('loading-msg');

            try {
                const resposta = await fetch('http://localhost:3000/pets');
                const petsDaAPI = await resposta.json();

                // FILTRO CRÍTICO: apenas pets com status 'Disponível'
                todosOsPets = petsDaAPI.filter(pet => pet.status === 'Disponível');
                renderizarCards(todosOsPets);

            } catch (erro) {
                console.error('Erro na conexão com o backend:', erro);
                if (loadingMsg) loadingMsg.remove();
                container.innerHTML = '<p style="padding: 2rem; color: var(--cor-secundaria); font-weight: bold;">Servidor offline. Ligue o backend para visualizar os pets disponíveis.</p>';
            }
        }

        function renderizarCards(pets) {
            const container = document.getElementById('grade-pets-container');
            container.innerHTML = '';

            if (pets.length === 0) {
                container.innerHTML = '<p style="padding: 2rem; color: var(--cor-secundaria); font-weight: bold;">Nenhum pet encontrado com esses filtros.</p>';
                return;
            }

            pets.forEach(pet => {
                const classeBolinha = pet.vermifugado === 'Sim' ? 'sim' : 'nao';
                const imagemPet = pet.imagem ? pet.imagem : 'assets/foto animal 1.png';

                // Lógica de formatação de idade (em meses)
                let idadeFormatada;
                if (pet.idade === null || pet.idade === undefined) {
                    idadeFormatada = 'Idade desconhecida';
                } else if (pet.idade <= 0) {
                    idadeFormatada = 'Recém-nascido';
                } else if (pet.idade === 1) {
                    idadeFormatada = '1 mês';
                } else if (pet.idade < 12) {
                    idadeFormatada = `${pet.idade} meses`;
                } else {
                    const anos = Math.floor(pet.idade / 12);
                    if (anos === 1) {
                        idadeFormatada = '1 ano';
                    } else {
                        idadeFormatada = `${anos} anos`;
                    }
                }

                const nomeExibido = pet.nome || 'Pet sem nome';
                const racaExibida = pet.raca || 'Raça desconhecida';

                const card = document.createElement('article');
                card.className = 'pet-card';
                card.innerHTML = `
                    <div class="pet-card-topo">
                        <img src="${imagemPet}" alt="Foto de ${nomeExibido}" class="pet-card-img">
                    </div>
                    <div class="pet-card-corpo">
                        <h3 style="margin: 0; color: var(--cor-primaria); font-family: var(--fonte-titulos); font-size: 1.4rem;">${nomeExibido}</h3>
                        <p style="margin: 0.3rem 0 1rem 0; font-size: 0.95rem; color: var(--cor-card-pet); font-weight: 600;">${racaExibida} &bull; ${idadeFormatada}</p>
                        <div class="pet-detalhe"><span class="pet-label">Espécie:</span> <span class="pet-valor">${pet.especie}</span></div>
                        <div class="pet-detalhe"><span class="pet-label">Gênero:</span> <span class="pet-valor">${pet.genero || '—'}</span></div>
                        <div class="pet-detalhe-inline">
                            <span class="pet-label">Vermifugado:</span>
                            <span class="pet-valor">${pet.vermifugado || '—'}</span>
                            <span class="circulo-vermifugado ${classeBolinha}"></span>
                        </div>
                        <div class="pet-card-footer">
                            <a href="perfil-pet.html?id=${pet.idPet}" class="pet-btn-ver">Ver</a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            carregarPets();

            // Toggle dos filtros avançados
            const btnAvancados = document.getElementById('btn-filtros-avancados');
            const drawerAvancados = document.getElementById('filtros-avancados-drawer');
            btnAvancados.addEventListener('click', () => {
                const aberto = drawerAvancados.classList.toggle('aberto');
                btnAvancados.textContent = aberto ? '− Filtros Avançados' : '+ Filtros Avançados';
            });

            document.getElementById('form-filtros').addEventListener('submit', (e) => {
                e.preventDefault();

                // Filtros básicos
                const especie = document.getElementById('filtro-especie').value;
                const genero = document.getElementById('filtro-genero').value;
                const vermifugado = document.getElementById('filtro-vermifugado').value;

                // Filtros avançados
                const nome = document.getElementById('filtro-nome').value.trim().toLowerCase();
                const raca = document.getElementById('filtro-raca').value.trim().toLowerCase();
                const cor = document.getElementById('filtro-cor').value.trim().toLowerCase();
                const idadeMinVal = document.getElementById('filtro-idade-min').value;
                const idadeMaxVal = document.getElementById('filtro-idade-max').value;
                
                // Converte a busca do usuário de ANOS para MESES, para comparar com o DB
                const idadeMinMeses = idadeMinVal !== '' ? parseInt(idadeMinVal, 10) * 12 : null;
                const idadeMaxMeses = idadeMaxVal !== '' ? parseInt(idadeMaxVal, 10) * 12 : null;

                const filtrados = todosOsPets.filter(pet => {
                    const okEspecie     = !especie     || pet.especie === especie;
                    const okGenero      = !genero      || pet.genero === genero;
                    const okVermifugado = !vermifugado || pet.vermifugado === vermifugado;
                    const okNome        = !nome        || (pet.nome && pet.nome.toLowerCase().includes(nome));
                    const okRaca        = !raca        || (pet.raca && pet.raca.toLowerCase().includes(raca));
                    const okCor         = !cor         || (pet.cor && pet.cor.toLowerCase().includes(cor));
                    const okIdadeMin    = idadeMinMeses === null || (pet.idade !== null && pet.idade >= idadeMinMeses);
                    const okIdadeMax    = idadeMaxMeses === null || (pet.idade !== null && pet.idade <= idadeMaxMeses);

                    return okEspecie && okGenero && okVermifugado && okNome && okRaca && okCor && okIdadeMin && okIdadeMax;
                });

                renderizarCards(filtrados);
            });
        });
    </script>
</body>

</html>
