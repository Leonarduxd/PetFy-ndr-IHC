<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetFy(ndr) - Adotar</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="cabecalho">
        <div class="cabecalho-logo">
            <a href="index.html">
                <img src="assets/logo PetFy(ndr).png" alt="Logo PetFy" class="logo-img">
            </a>
        </div>
        <nav class="cabecalho-navegacao">
            <ul class="menu">
                <li><a href="index.html" class="menu-item">Início</a></li>
                <li><a href="adotar.html" class="menu-item ativo">Adotar</a></li>
                <li><a href="doacao.html" class="menu-item">Doações</a></li>
                <li><a href="quem-somos.html" class="menu-item">Quem Somos</a></li>
            </ul>
        </nav>
        <div class="area-usuario">
            <img src="assets/foto perfil comum.png" alt="Perfil do Usuário" class="profile-pic">
            <div class="menu-container">
                <div class="menu-icon">
                    <img src="assets/simbolo menu hamburger.png" alt="Menu" style="width: 30px; cursor: pointer;">
                </div>
                <div class="dropdown-menu">
                    <div class="dropdown-content">
                        <!-- Preenchido dinamicamente por petfy-app.js -->
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="conteudo-principal adotar-main">
        <!-- Seção de Filtros (O Hub) -->
        <section class="secao-filtros">
            <form class="filtros-form" id="form-filtros">
                <div class="filtro-campo">
                    <label for="filtro-especie" class="filtro-label">Espécie</label>
                    <select id="filtro-especie" name="especie" class="filtro-select">
                        <option value="">Todas</option>
                        <option value="Cachorro">Cães</option>
                        <option value="Gato">Gatos</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
                <div class="filtro-campo">
                    <label for="filtro-genero" class="filtro-label">Gênero</label>
                    <select id="filtro-genero" name="genero" class="filtro-select">
                        <option value="">Todos</option>
                        <option value="Macho">Macho</option>
                        <option value="Fêmea">Fêmea</option>
                    </select>
                </div>
                <div class="filtro-campo">
                    <label for="filtro-vermifugado" class="filtro-label">Vermifugado</label>
                    <select id="filtro-vermifugado" name="vermifugado" class="filtro-select">
                        <option value="">Todos</option>
                        <option value="Sim">Sim</option>
                        <option value="Não">Não</option>
                    </select>
                </div>
                <button type="submit" class="filtro-btn">Filtrar</button>
            </form>
        </section>

        <!-- Seção da Grade de Pets (O Catálogo) -->
        <section class="grade-pets" id="grade-pets-container">
            <p id="loading-msg" style="padding: 2rem; color: var(--cor-secundaria); font-weight: bold;">
                Carregando pets disponíveis...
            </p>
        </section>
    </main>

    <footer class="rodape">
        <div class="rodape-conteudo">
            <p class="rodape-texto">&copy; 2026 PetFy. Todos os direitos reservados. Desenvolvido para facilitar a
                adoção e o cuidado animal.</p>
        </div>
    </footer>

    <!-- Script compartilhado: Auth + Navbar dinâmica -->
    <script src="petfy-app.js"></script>

    <!-- Módulo 2: Catálogo dinâmico com filtro por status 'Disponível' -->
    <script>
        let todosOsPets = [];

        async function carregarPets() {
            const container = document.getElementById('grade-pets-container');
            const loadingMsg = document.getElementById('loading-msg');

            try {
                const resposta = await fetch('http://localhost:3000/pets');
                const petsDaAPI = await resposta.json();

                // FILTRO CRÍTICO: apenas pets com status 'Disponível'
                todosOsPets = petsDaAPI.filter(pet => pet.status === 'Disponível');
                renderizarCards(todosOsPets);

            } catch (erro) {
                console.error('Erro na conexão com o backend:', erro);
                if (loadingMsg) loadingMsg.remove();
                container.innerHTML = '<p style="padding: 2rem; color: var(--cor-secundaria); font-weight: bold;">Servidor offline. Ligue o backend para visualizar os pets disponíveis.</p>';
            }
        }

        function renderizarCards(pets) {
            const container = document.getElementById('grade-pets-container');
            container.innerHTML = '';

            if (pets.length === 0) {
                container.innerHTML = '<p style="padding: 2rem; color: var(--cor-secundaria); font-weight: bold;">Nenhum pet encontrado com esses filtros.</p>';
                return;
            }

            pets.forEach(pet => {
                const classeBolinha = pet.vermifugado === 'Sim' ? 'sim' : 'nao';
                const imagemPet = pet.imagem ? pet.imagem : 'assets/foto animal 1.png';

                const card = document.createElement('article');
                card.className = 'pet-card';
                card.innerHTML = `
                    <div class="pet-card-topo">
                        <img src="${imagemPet}" alt="Foto de ${pet.nome || pet.especie}" class="pet-card-img">
                    </div>
                    <div class="pet-card-corpo">
                        <div class="pet-detalhe"><span class="pet-label">Espécie:</span> <span class="pet-valor">${pet.especie}</span></div>
                        <div class="pet-detalhe"><span class="pet-label">Gênero:</span> <span class="pet-valor">${pet.genero || '—'}</span></div>
                        <div class="pet-detalhe"><span class="pet-label">Cor:</span> <span class="pet-valor">${pet.cor}</span></div>
                        <div class="pet-detalhe-inline">
                            <span class="pet-label">Vermifugado:</span>
                            <span class="pet-valor">${pet.vermifugado || '—'}</span>
                            <span class="circulo-vermifugado ${classeBolinha}"></span>
                        </div>
                        <div class="pet-detalhe"><span class="pet-label">Nome:</span> <span class="pet-valor">${pet.nome || '—'}</span></div>
                        <div class="pet-card-footer">
                            <a href="perfil-pet.html?id=${pet.idPet}" class="pet-btn-ver">Ver</a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            carregarPets();

            document.getElementById('form-filtros').addEventListener('submit', (e) => {
                e.preventDefault();
                const especie = document.getElementById('filtro-especie').value;
                const genero = document.getElementById('filtro-genero').value;
                const vermifugado = document.getElementById('filtro-vermifugado').value;

                const filtrados = todosOsPets.filter(pet => {
                    const okEspecie = !especie || pet.especie === especie;
                    const okGenero = !genero || pet.genero === genero;
                    const okVermifugado = !vermifugado || pet.vermifugado === vermifugado;
                    return okEspecie && okGenero && okVermifugado;
                });

                renderizarCards(filtrados);
            });
        });
    </script>
</body>

</html>
